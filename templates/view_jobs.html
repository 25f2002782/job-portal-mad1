<!DOCTYPE html>
<html>
<head>
    <title>Jobs</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="container">
    <div class="card">
        <h2>Jobs</h2>

        <form method="POST">
            <input type="text" name="search" placeholder="Search jobs">
            <button type="submit">Search</button>
        </form>

        {% for job in jobs %}
            <div class="card">
                <h3>{{ job.title }}</h3>
                <p>{{ job.description }}</p>
                <p><b>Skills:</b> {{ job.skills }}</p>

                <a href="/apply/{{ job.id }}">Apply</a>
            </div>
        {% endfor %}

        <a href="/dashboard">Back</a>
    </div>
</div>

</body>
</html>
